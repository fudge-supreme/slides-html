<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Phrasal Verbs — English for Facialists</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─────────────────────────── */
:root {
  --m50:#f0faf6; --m100:#d6f2e7; --m200:#aee4cf; --m300:#7ecdb3;
  --m400:#4fb898; --m500:#2ea882; --m600:#1d8a68; --m700:#166b51;
  --g50:#f7f8f7; --g100:#edeeed; --g200:#d6d8d5; --g300:#b2b5b0;
  --g400:#878a84; --g500:#5e6159; --g700:#343630; --g900:#181a15;
  --white:#ffffff;
  --fd:'Cormorant Garamond',serif;
  --fb:'DM Sans',sans-serif;
  --fm:'DM Mono',monospace;
  /* glass */
  --glass-bg: rgba(255,255,255,.62);
  --glass-bg-strong: rgba(255,255,255,.82);
  --glass-border: rgba(255,255,255,.75);
  --glass-shadow: 0 8px 32px rgba(46,168,130,.09), 0 2px 8px rgba(0,0,0,.06);
  --glass-shadow-hover: 0 20px 60px rgba(46,168,130,.16), 0 4px 16px rgba(0,0,0,.08);
}

/* ─── RESET ──────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;}
body {
  font-family:var(--fb);
  background:#e8f5ef;
  color:var(--g700);
  overflow-x:hidden;
  min-height:100vh;
}

/* ─── RICH BACKGROUND ────────────────── */
.bg {
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 5%,  rgba(174,228,207,.55) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 90%,  rgba(126,205,179,.45) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(240,250,246,.7) 0%, transparent 60%),
    radial-gradient(ellipse 70% 60% at 75% 15%,  rgba(255,255,255,.5) 0%, transparent 50%),
    linear-gradient(150deg, #d6f2e7 0%, #e8f5ef 35%, #f0faf6 65%, #d0ede2 100%);
  animation: bgShift 18s ease-in-out infinite alternate;
}
@keyframes bgShift {
  0%   { filter: hue-rotate(0deg) brightness(1); }
  50%  { filter: hue-rotate(4deg) brightness(1.02); }
  100% { filter: hue-rotate(-3deg) brightness(.99); }
}
/* Orb blobs */
.orb {
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  filter:blur(60px);opacity:.35;
  animation: orbFloat 12s ease-in-out infinite;
}
.orb1{width:500px;height:500px;background:rgba(46,168,130,.18);top:-80px;left:-100px;}
.orb2{width:400px;height:400px;background:rgba(126,205,179,.15);bottom:-60px;right:-80px;animation-delay:-5s;animation-duration:15s;}
.orb3{width:300px;height:300px;background:rgba(255,255,255,.25);top:40%;left:55%;animation-delay:-8s;animation-duration:10s;}
@keyframes orbFloat {
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-20px) scale(1.05);}
  66%{transform:translate(-20px,15px) scale(.97);}
}

/* ─── PAGE LAYOUT ────────────────────── */
.page {
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  min-height:100vh;
  padding:0 32px 80px;
  max-width:1440px;
  margin:0 auto;
}

/* ─── HERO ───────────────────────────── */
.hero {
  padding:52px 0 36px;
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:24px;flex-wrap:wrap;
}
.hero-left {}
.hero-eyebrow {
  font-family:var(--fm);font-size:10px;letter-spacing:3.5px;
  text-transform:uppercase;color:var(--m500);margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.hero-eyebrow::before{content:'';width:28px;height:1px;background:var(--m400);}
.hero-title {
  font-family:var(--fd);font-size:clamp(3rem,5.5vw,5.5rem);
  font-weight:300;line-height:1;color:var(--g900);margin-bottom:10px;
}
.hero-title em{font-style:italic;color:var(--m500);}
.hero-sub{font-size:.87rem;color:var(--g400);font-weight:300;line-height:1.7;max-width:380px;}
.hero-stat {
  text-align:right;flex-shrink:0;
}
.hero-stat .big {
  font-family:var(--fd);font-size:clamp(4rem,6vw,7rem);font-weight:300;
  line-height:1;color:transparent;
  -webkit-text-stroke:1px var(--m300);
  display:block;
}
.hero-stat .lbl {
  font-family:var(--fm);font-size:10px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--g300);
}

/* ─── CONTROLS GLASS BAR ─────────────── */
.controls-bar {
  position:sticky;top:0;z-index:50;
  margin:0 -32px;padding:14px 32px;
  background:rgba(240,250,246,.75);
  backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid rgba(255,255,255,.6);
  display:flex;gap:12px;flex-wrap:wrap;align-items:center;
}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-wrap svg{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;stroke:var(--g300);pointer-events:none;
}
.search {
  width:100%;padding:9px 16px 9px 38px;
  border:1.5px solid rgba(255,255,255,.8);
  border-radius:40px;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(10px);
  font-family:var(--fb);font-size:.84rem;color:var(--g700);
  outline:none;transition:border-color .2s,background .2s,box-shadow .2s;
}
.search::placeholder{color:var(--g300);}
.search:focus{
  border-color:var(--m300);background:rgba(255,255,255,.9);
  box-shadow:0 0 0 3px rgba(46,168,130,.1);
}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap;}
.flt {
  padding:7px 16px;
  border:1.5px solid rgba(255,255,255,.7);
  border-radius:40px;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(8px);
  font-family:var(--fb);font-size:.78rem;font-weight:400;
  color:var(--g400);cursor:pointer;
  transition:all .22s;white-space:nowrap;
}
.flt:hover{border-color:var(--m200);color:var(--m600);background:rgba(255,255,255,.8);}
.flt.active{
  background:rgba(46,168,130,.88);
  border-color:rgba(46,168,130,.9);
  color:var(--white);font-weight:500;
  box-shadow:0 4px 14px rgba(46,168,130,.35);
  backdrop-filter:none;
}
.count-lbl{
  font-family:var(--fm);font-size:.68rem;color:var(--g300);
  letter-spacing:1px;white-space:nowrap;margin-left:auto;
}
.count-lbl span{color:var(--m500);}

/* ─── SECTION ────────────────────────── */
.section-label {
  display:flex;align-items:center;gap:14px;
  padding:36px 0 18px;
}
.section-label h2{
  font-family:var(--fd);font-size:1.8rem;font-weight:300;color:var(--g700);
  white-space:nowrap;
}
.section-label h2 em{font-style:italic;color:var(--m500);}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(174,228,207,.6),transparent);}
.section-ct{font-family:var(--fm);font-size:.62rem;color:var(--g300);letter-spacing:1px;white-space:nowrap;}

/* ─── GRID ───────────────────────────── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:16px;
  /* hover defocus: grid dims all cards when one is focused */
}
.grid.has-focus .card:not(.focused){
  opacity:.45;
  filter:blur(1.5px) saturate(.7);
  transform:scale(.985);
  transition:opacity .35s ease, filter .35s ease, transform .35s ease;
}

/* ─── CARD — LIQUID GLASS ────────────── */
.card {
  position:relative;
  background:var(--glass-bg);
  border:1.5px solid var(--glass-border);
  border-radius:20px;
  padding:22px 24px;
  cursor:pointer;
  overflow:hidden;
  transition:
    transform .35s cubic-bezier(.22,1,.36,1),
    box-shadow .35s ease,
    border-color .35s ease,
    opacity .35s ease,
    filter .35s ease;
  box-shadow:var(--glass-shadow);
  backdrop-filter:blur(16px) saturate(1.3);
  -webkit-backdrop-filter:blur(16px) saturate(1.3);
  will-change:transform;
}

/* inner shimmer layer */
.card::before {
  content:'';
  position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(
    135deg,
    rgba(255,255,255,.55) 0%,
    rgba(255,255,255,.1) 40%,
    rgba(174,228,207,.08) 100%
  );
  pointer-events:none;
  transition:opacity .35s ease;
}
/* mint accent line top */
.card::after {
  content:'';
  position:absolute;top:0;left:20px;right:20px;height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(46,168,130,.5),transparent);
  border-radius:0 0 3px 3px;
  opacity:0;
  transition:opacity .35s ease;
}
.card.focused {
  transform:translateY(-6px) scale(1.02);
  box-shadow:var(--glass-shadow-hover);
  border-color:rgba(174,228,207,.9);
  background:var(--glass-bg-strong);
  z-index:10;
}
.card.focused::after{opacity:1;}
.card.focused::before{opacity:.8;}
.card.open {
  border-color:rgba(126,205,179,.7);
  box-shadow:0 12px 40px rgba(46,168,130,.14), 0 3px 10px rgba(0,0,0,.07);
}
.card.hidden{display:none;}

/* ─── CARD INTERNALS ─────────────────── */
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.card-verb{
  font-family:var(--fd);font-size:1.7rem;font-weight:300;
  color:var(--g900);line-height:1.1;
}
.card-verb em{font-style:italic;color:var(--m500);}
.cat-pill{
  flex-shrink:0;font-family:var(--fm);font-size:.58rem;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;margin-top:5px;
  backdrop-filter:blur(4px);
}
.cat-cabin {background:rgba(214,242,231,.7);color:var(--m600);border:1px solid rgba(174,228,207,.8);}
.cat-work  {background:rgba(237,232,252,.7);color:#6b4faf;border:1px solid rgba(200,185,240,.8);}
.cat-social{background:rgba(252,235,230,.7);color:#a04f30;border:1px solid rgba(240,195,180,.8);}
.cat-daily {background:rgba(232,240,254,.7);color:#3050a0;border:1px solid rgba(185,200,245,.8);}

.card-es{
  font-size:.84rem;color:var(--g400);line-height:1.55;
  margin-bottom:14px;font-weight:300;
}
.card-divider{
  height:1px;
  background:linear-gradient(90deg,rgba(174,228,207,.5),transparent);
  margin-bottom:14px;
}

/* ─── EXAMPLES ───────────────────────── */
.card-examples{
  display:flex;flex-direction:column;gap:0;
  overflow:hidden;
  max-height:0;
  opacity:0;
  transition:max-height .42s cubic-bezier(.22,1,.36,1), opacity .35s ease;
}
.card.open .card-examples{
  max-height:600px;
  opacity:1;
}
.ex-item{
  padding:10px 0;
  border-bottom:1px solid rgba(174,228,207,.25);
}
.ex-item:last-child{border-bottom:none;padding-bottom:0;}
.ex-num{
  font-family:var(--fm);font-size:.56rem;letter-spacing:2px;
  text-transform:uppercase;color:var(--m400);margin-bottom:4px;
}
.ex-en{
  font-family:var(--fd);font-size:1.02rem;font-weight:300;
  font-style:italic;color:var(--g700);line-height:1.45;margin-bottom:3px;
}
.ex-en strong{color:var(--m600);font-weight:600;font-style:normal;}
.ex-es{font-size:.76rem;color:var(--g300);font-weight:300;}

/* toggle btn */
.card-toggle{
  display:flex;align-items:center;gap:5px;
  font-family:var(--fm);font-size:.62rem;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--m400);
  border:none;background:none;cursor:pointer;padding:0;
  transition:color .2s;
}
.card-toggle:hover{color:var(--m600);}
.card-toggle svg{
  width:13px;height:13px;stroke:currentColor;
  transition:transform .3s cubic-bezier(.22,1,.36,1);
}
.card.open .card-toggle svg{transform:rotate(180deg);}

/* ─── TOPBAR ─────────────────────────── */
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 0 0;
}
.expand-all{
  font-family:var(--fm);font-size:.64rem;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--g300);
  background:none;border:none;cursor:pointer;
  transition:color .2s;
}
.expand-all:hover{color:var(--m500);}

/* ─── EMPTY ──────────────────────────── */
.empty{display:none;text-align:center;padding:80px 0;}
.empty.show{display:block;}
.empty-glyph{
  font-family:var(--fd);font-size:5rem;font-weight:300;
  color:var(--m100);line-height:1;margin-bottom:16px;
}
.empty p{font-size:.88rem;color:var(--g300);}

/* ─── SCROLLBAR ──────────────────────── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(126,205,179,.4);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--m300);}

/* ─── MOBILE ─────────────────────────── */
@media(max-width:640px){
  .page{padding:0 16px 60px;}
  .controls-bar{margin:0 -16px;padding:12px 16px;}
  .hero{padding:36px 0 24px;}
  .hero-stat .big{font-size:3.5rem;}
  .grid{grid-template-columns:1fr;gap:10px;}
  .hero-title{font-size:2.8rem;}
}
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="page">

  <!-- HERO -->
  <header class="hero">
    <div class="hero-left">
      <div class="hero-eyebrow">English for Facialists</div>
      <h1 class="hero-title">Phrasal<br><em>Verbs</em></h1>
      <p class="hero-sub">Los verbos más útiles para la cabina, el trabajo, la vida social y el día a día. Tres ejemplos por cada uno.</p>
    </div>
    <div class="hero-stat">
      <span class="big" id="total-n">45</span>
      <span class="lbl">phrasal verbs</span>
    </div>
  </header>

  <!-- STICKY CONTROLS -->
  <div class="controls-bar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search" id="search" placeholder="Buscar phrasal verb o traducción…" autocomplete="off" spellcheck="false" inputmode="text">
    </div>
    <div class="filter-btns">
      <button class="flt active" data-cat="all">Todos</button>
      <button class="flt" data-cat="cabin">🌿 Cabina</button>
      <button class="flt" data-cat="work">💼 Trabajo</button>
      <button class="flt" data-cat="social">🤝 Social</button>
      <button class="flt" data-cat="daily">☀️ Diario</button>
    </div>
    <span class="count-lbl"><span id="count-n">45</span> verbos</span>
  </div>

  <div class="topbar">
    <div></div>
    <button class="expand-all" id="expand-all-btn" onclick="toggleAll()">Expandir todos</button>
  </div>

  <div class="empty" id="empty">
    <div class="empty-glyph">∅</div>
    <p>No hay resultados para esa búsqueda.</p>
  </div>

  <div id="content"></div>

</div>

<script>
const DATA = [
/* ── CABIN ── */
{v:"lie down", vP:["lie","down"], cat:"cabin",
 es:"Acostarse, recostarse (boca arriba o boca abajo)",
 exs:[
  {en:"Please <strong>lie down</strong> on the treatment bed and make yourself comfortable.", es:"Por favor recuéstese en la camilla y póngase cómoda."},
  {en:"I need you to <strong>lie down</strong> flat so I can work on your full face.", es:"Necesito que se acueste plana para trabajar en toda su cara."},
  {en:"You can <strong>lie down</strong> now — I am ready to start the treatment.", es:"Ya puede acostarse, estoy lista para comenzar."},
 ]},
{v:"sit up", vP:["sit","up"], cat:"cabin",
 es:"Incorporarse, sentarse derecho desde posición acostada",
 exs:[
  {en:"You can <strong>sit up</strong> slowly now — take your time.", es:"Puede incorporarse despacio, no hay prisa."},
  {en:"Please <strong>sit up</strong> so I can check your skin in this light.", es:"Por favor siéntese para revisar su piel con esta luz."},
  {en:"I need you to <strong>sit up</strong> for a moment while I adjust the headband.", es:"Necesito que se siente un momento mientras ajusto la banda."},
 ]},
{v:"come in", vP:["come","in"], cat:"cabin",
 es:"Entrar, pasar a un lugar",
 exs:[
  {en:"Please <strong>come in</strong> — the treatment room is ready for you.", es:"Por favor pase, la sala de tratamiento está lista."},
  {en:"<strong>Come in</strong> and hang your coat on the hook by the door.", es:"Pase y cuelgue su abrigo en el gancho de la puerta."},
  {en:"You can <strong>come in</strong> now. I just finished setting everything up.", es:"Ya puede pasar, acabo de terminar de preparar todo."},
 ]},
{v:"take off", vP:["take","off"], cat:"cabin",
 es:"Quitarse (ropa, accesorios, joyería)",
 exs:[
  {en:"Please <strong>take off</strong> your earrings before we begin.", es:"Por favor quítese los aretes antes de comenzar."},
  {en:"Could you <strong>take off</strong> your necklace? It gets in the way during the facial.", es:"¿Podría quitarse el collar? Estorba durante el facial."},
  {en:"Please <strong>take off</strong> your glasses and put them on the tray.", es:"Por favor quítese los lentes y póngalos en la charola."},
 ]},
{v:"put on", vP:["put","on"], cat:"cabin",
 es:"Ponerse, colocarse algo encima",
 exs:[
  {en:"Please <strong>put on</strong> this disposable robe before lying down.", es:"Por favor póngase esta bata desechable antes de acostarse."},
  {en:"I am going to <strong>put on</strong> a warm compress on your face now.", es:"Voy a colocar una compresa caliente en su cara ahora."},
  {en:"<strong>Put on</strong> the headband and I will start the cleansing.", es:"Póngase la banda y comenzaré la limpieza."},
 ]},
{v:"turn over", vP:["turn","over"], cat:"cabin",
 es:"Darse vuelta, voltear el cuerpo de un lado a otro",
 exs:[
  {en:"Now please <strong>turn over</strong> onto your stomach for the next step.", es:"Ahora por favor voltéese boca abajo para el siguiente paso."},
  {en:"Could you <strong>turn over</strong> to your right side for a moment?", es:"¿Podría voltear hacia su lado derecho un momento?"},
  {en:"I need you to <strong>turn over</strong> slowly — the bed can be slippery.", es:"Necesito que se voltee despacio, la camilla puede estar resbalosa."},
 ]},
{v:"hold still", vP:["hold","still"], cat:"cabin",
 es:"Quedarse completamente quieto, sin moverse",
 exs:[
  {en:"Please <strong>hold still</strong> — I am working around your eyes.", es:"Por favor quédese quieta, estoy trabajando alrededor de sus ojos."},
  {en:"Try to <strong>hold still</strong> for just thirty seconds while this sets.", es:"Intente quedarse quieta treinta segundos mientras esto asienta."},
  {en:"<strong>Hold still</strong> — I don't want to smudge the mask.", es:"No se mueva, no quiero manchar la mascarilla."},
 ]},
{v:"close up", vP:["close","up"], cat:"cabin",
 es:"Acercarse, aproximarse hacia alguien",
 exs:[
  {en:"Could you <strong>close up</strong> a little? I need to examine your pores.", es:"¿Puede acercarse un poco? Necesito examinar sus poros."},
  {en:"Please <strong>close up</strong> to the lamp so I can see your skin better.", es:"Por favor acérquese a la lámpara para ver mejor su piel."},
  {en:"<strong>Close up</strong> and look straight ahead — perfect, thank you.", es:"Acérquese y mire al frente — perfecto, gracias."},
 ]},
{v:"look up", vP:["look","up"], cat:"cabin",
 es:"Mirar hacia arriba con la vista",
 exs:[
  {en:"Please <strong>look up</strong> so I can check the skin under your eyes.", es:"Por favor mire hacia arriba para revisar bajo sus ojos."},
  {en:"<strong>Look up</strong> slowly and keep your eyes relaxed.", es:"Mire hacia arriba despacio y mantenga los ojos relajados."},
  {en:"<strong>Look up</strong> for a moment — I am almost done with this area.", es:"Mire hacia arriba un momento, casi termino esta zona."},
 ]},
{v:"look down", vP:["look","down"], cat:"cabin",
 es:"Mirar hacia abajo con los ojos",
 exs:[
  {en:"Now <strong>look down</strong> so I can treat the area above your brows.", es:"Ahora mire hacia abajo para tratar el área sobre sus cejas."},
  {en:"<strong>Look down</strong> gently — don't close your eyes completely.", es:"Baje la mirada suavemente, no cierre los ojos del todo."},
  {en:"Can you <strong>look down</strong> while I apply this serum?", es:"¿Puede mirar hacia abajo mientras aplico este suero?"},
 ]},
{v:"tilt back", vP:["tilt","back"], cat:"cabin",
 es:"Inclinar la cabeza hacia atrás",
 exs:[
  {en:"Please <strong>tilt</strong> your head <strong>back</strong> so I can work on your chin.", es:"Por favor incline la cabeza hacia atrás para trabajar en su barbilla."},
  {en:"<strong>Tilt back</strong> a little — not too far, just a comfortable angle.", es:"Inclínese hacia atrás un poco, no demasiado, solo un ángulo cómodo."},
  {en:"I need you to <strong>tilt</strong> your head <strong>back</strong> while the mask dries.", es:"Necesito que incline la cabeza hacia atrás mientras se seca la mascarilla."},

const CATS = {
  all:   {label:"Todos",  emoji:""},
  cabin: {label:"Cabina", emoji:"🌿", cls:"cat-cabin"},
  work:  {label:"Trabajo",emoji:"💼", cls:"cat-work"},
  social:{label:"Social", emoji:"🤝", cls:"cat-social"},
  daily: {label:"Diario", emoji:"☀️", cls:"cat-daily"},
};

let currentCat = "all";
let allExpanded = false;

/* ── VERB HTML ── */
function vHtml(d){
  const [main,part] = d.vP;
  return `${main} <em>${part}</em>`;
}

/* ── BUILD ── */
function buildContent(){
  const cont = document.getElementById("content");
  cont.innerHTML = "";
  const order = ["cabin","work","social","daily"];

  order.forEach(cat => {
    const items = DATA.filter(d=>d.cat===cat);
    const sec = document.createElement("div");
    sec.className = "cat-section"; sec.dataset.cat = cat;

    sec.innerHTML = `<div class="section-label">
      <h2>${CATS[cat].emoji} <em>${CATS[cat].label}</em></h2>
      <div class="section-line"></div>
      <span class="section-ct">${items.length} verbos</span>
    </div>`;

    const grid = document.createElement("div");
    grid.className = "grid"; grid.id = "g-"+cat;

    items.forEach((d, i) => {
      const card = document.createElement("div");
      card.className = "card";
      card.id = "c-"+d.v.replace(/ /g,"_");
      card.dataset.cat = d.cat;
      card.dataset.v = d.v.toLowerCase();
      card.dataset.es = d.es.toLowerCase();
      card.style.animationDelay = (i*0.035)+"s";
      card.style.animation = "cardIn .45s ease both";

      const exHtml = d.exs.map((e,n)=>`
        <div class="ex-item">
          <div class="ex-num">Ejemplo ${n+1}</div>
          <div class="ex-en">${e.en}</div>
          <div class="ex-es">${e.es}</div>
        </div>`).join("");

      card.innerHTML = `
        <div class="card-head">
          <div class="card-verb">${vHtml(d)}</div>
          <span class="cat-pill ${CATS[d.cat].cls}">${CATS[d.cat].label}</span>
        </div>
        <div class="card-es">${d.es}</div>
        <button class="card-toggle" onclick="event.stopPropagation();toggleCard(this)">
          Ver ejemplos
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="card-examples">${exHtml}</div>`;

      /* focus/blur hover */
      card.addEventListener("mouseenter", ()=>focusCard(card));
      card.addEventListener("mouseleave", ()=>blurCard(card));
      card.addEventListener("click", ()=>toggleCard(card.querySelector(".card-toggle")));
      card.addEventListener("touchstart",()=>focusCard(card),{passive:true});
      card.addEventListener("touchend",  ()=>blurCard(card), {passive:true});

      grid.appendChild(card);
    });

    sec.appendChild(grid);
    cont.appendChild(sec);
  });

  addCardAnim();
}

/* ── FOCUS / BLUR ── */
function focusCard(card){
  const grid = card.closest(".grid");
  if(!grid) return;
  grid.classList.add("has-focus");
  card.classList.add("focused");
}
function blurCard(card){
  const grid = card.closest(".grid");
  if(!grid) return;
  grid.classList.remove("has-focus");
  card.classList.remove("focused");
}

/* ── TOGGLE ── */
function toggleCard(btn){
  const card = btn.closest ? btn.closest(".card") : btn;
  const toggle = card.querySelector(".card-toggle");
  card.classList.toggle("open");
  toggle.childNodes[0].textContent = card.classList.contains("open") ? "Cerrar " : "Ver ejemplos ";
}

/* ── FILTER ── */
function doFilter(){
  const q = document.getElementById("search").value.toLowerCase().trim();
  let vis = 0;
  document.querySelectorAll(".card").forEach(c=>{
    const mc = currentCat==="all" || c.dataset.cat===currentCat;
    const mq = !q || c.dataset.v.includes(q) || c.dataset.es.includes(q);
    const show = mc && mq;
    c.classList.toggle("hidden",!show);
    if(show) vis++;
  });
  document.querySelectorAll(".cat-section").forEach(s=>{
    const cm = currentCat==="all"||currentCat===s.dataset.cat;
    const hv = s.querySelectorAll(".card:not(.hidden)").length>0;
    s.style.display = (!cm||!hv)?"none":"";
  });
  document.getElementById("count-n").textContent = vis;
  document.getElementById("total-n").textContent = vis;
  document.getElementById("empty").classList.toggle("show", vis===0);
}

function setCat(cat){
  currentCat=cat;
  document.querySelectorAll(".flt").forEach(b=>b.classList.toggle("active",b.dataset.cat===cat));
  doFilter();
}

/* ── EXPAND ALL ── */
function toggleAll(){
  allExpanded=!allExpanded;
  document.querySelectorAll(".card:not(.hidden)").forEach(c=>{
    const t=c.querySelector(".card-toggle");
    if(allExpanded){c.classList.add("open");t.childNodes[0].textContent="Cerrar ";}
    else{c.classList.remove("open");t.childNodes[0].textContent="Ver ejemplos ";}
  });
  document.getElementById("expand-all-btn").textContent=allExpanded?"Colapsar todos":"Expandir todos";
}

/* ── CARD ANIMATION ── */
function addCardAnim(){
  const style = document.createElement("style");
  style.textContent=`@keyframes cardIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}`;
  document.head.appendChild(style);
}

/* ── INIT ── */
buildContent();
document.getElementById("search").addEventListener("input", doFilter);
document.querySelectorAll(".flt").forEach(b=>b.addEventListener("click",()=>setCat(b.dataset.cat)));
</script>
