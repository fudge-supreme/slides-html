<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Introducción al Inglés · Alfabeto, Pronunciación & Verb To Be</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Geist:wght@300..900&display=swap" rel="stylesheet">
<style>
  :root{
    --font-display: 'Fraunces', 'Times New Roman', serif;
    --font-body: 'Geist', -apple-system, system-ui, sans-serif;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}

  html,body{
    width:100%;height:100%;overflow:hidden;
    font-family:var(--font-body);
    background:#06060a;color:#fff;
    letter-spacing:-0.01em;
  }

  /* ============= PRESENTATION SHELL ============= */
  .stage{position:fixed;inset:0;overflow:hidden;}

  .slide{
    position:absolute;inset:0;
    opacity:0;pointer-events:none;
    transition:opacity 0.7s var(--ease-out);
    display:flex;align-items:center;justify-content:center;
    padding:clamp(24px, 4vw, 64px);
    isolation:isolate;
  }
  .slide.active{opacity:1;pointer-events:auto;}
  .slide.active .slide-inner{transform:translateY(0) scale(1);opacity:1;}
  .slide-inner{
    position:relative;z-index:2;width:100%;height:100%;
    display:flex;flex-direction:column;
    transform:translateY(30px) scale(0.98);opacity:0;
    transition:all 0.8s var(--ease-out) 0.15s;
  }

  /* ============= BACKDROPS ============= */
  .bg-layer{position:absolute;inset:0;z-index:0;overflow:hidden;}
  .bg-layer::before{
    content:"";position:absolute;inset:-20%;
    background:radial-gradient(circle at 25% 30%, var(--c1) 0%, transparent 55%),
               radial-gradient(circle at 78% 70%, var(--c2) 0%, transparent 60%),
               linear-gradient(135deg, #0a0a14 0%, #1a0a20 100%);
    filter:saturate(1.1);
  }
  .orb{
    position:absolute;border-radius:50%;filter:blur(90px);opacity:0.45;
  }
  .orb.a{width:520px;height:520px;background:var(--c1);top:-10%;left:-10%;}
  .orb.b{width:420px;height:420px;background:var(--c2);bottom:-15%;right:-10%;}
  .orb.c{width:320px;height:320px;background:var(--c1);top:40%;right:20%;opacity:0.28;}
  /* subtle grain removed: mix-blend-mode:overlay on full-screen caused
     compositor color shifts whenever hover triggered a repaint */

  /* ============= GLASS ============= */
  .glass{
    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25),
                inset 0 1px 0 rgba(255,255,255,0.18),
                inset 0 -1px 0 rgba(0,0,0,0.15);
  }
  .glass-soft{
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:18px;
  }

  /* ============= NAVIGATION ============= */
  .nav-btn{
    position:fixed;top:50%;transform:translateY(-50%);
    width:56px;height:56px;border-radius:50%;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.18);
    color:#fff;cursor:pointer;z-index:50;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    transition:background 0.25s ease, border-color 0.25s ease;
    box-shadow:0 8px 24px rgba(0,0,0,0.2);
  }
  .nav-btn:hover{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.3);}
  .nav-btn:active{background:rgba(255,255,255,0.28);}
  .nav-btn.prev{left:24px;}
  .nav-btn.next{right:24px;}
  .nav-btn:disabled{opacity:0.3;cursor:not-allowed;}

  /* Progress bar + counter */
  .hud{
    position:fixed;top:24px;left:50%;transform:translateX(-50%);
    z-index:50;display:flex;gap:12px;align-items:center;
    padding:8px 18px;
  }
  .hud-counter{font-family:var(--font-display);font-weight:500;font-size:14px;letter-spacing:0.08em;opacity:0.85;}
  .progress-wrap{position:fixed;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.08);z-index:50;}
  .progress-bar{height:100%;background:linear-gradient(90deg,#fff,rgba(255,255,255,0.6));transition:width 0.5s var(--ease-out);width:0%;}

  /* Menu button */
  .menu-btn{
    position:fixed;top:24px;right:24px;z-index:50;
    padding:10px 18px;font-size:13px;
    font-family:var(--font-body);font-weight:500;
    cursor:pointer;border:none;color:#fff;
    letter-spacing:0.04em;
  }
  .menu{
    position:fixed;inset:0;z-index:100;
    background:rgba(6,6,10,0.7);
    backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
    display:none;align-items:center;justify-content:center;padding:40px;
  }
  .menu.open{display:flex;}
  .menu-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
    gap:10px;max-width:900px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;
  }
  .menu-item{
    aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:var(--font-display);font-weight:700;font-size:32px;
    cursor:pointer;transition:all 0.3s var(--ease-out);
    border-radius:14px;padding:10px;
  }
  .menu-item:hover{transform:translateY(-3px) scale(1.03);}
  .menu-item .mini{font-family:var(--font-body);font-size:10px;font-weight:400;opacity:0.7;margin-top:4px;text-align:center;letter-spacing:0.03em;}
  .menu-close{position:absolute;top:24px;right:24px;background:none;border:none;color:#fff;font-size:32px;cursor:pointer;opacity:0.7;}
  .menu-close:hover{opacity:1;}

  /* ============= TYPOGRAPHY ============= */
  h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;letter-spacing:-0.03em;line-height:1.05;}

  .eyebrow{
    font-family:var(--font-body);font-size:12px;font-weight:500;
    text-transform:uppercase;letter-spacing:0.25em;opacity:0.75;
    margin-bottom:10px;
  }

  /* ============= LAYOUT: TITLE SLIDE ============= */
  .hero{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:24px;flex:1;}
  .hero-tag{font-size:14px;letter-spacing:0.3em;text-transform:uppercase;opacity:0.8;}
  .hero h1{
    font-size:clamp(3rem, 9vw, 8rem);
    font-weight:400;
    font-style:italic;
    max-width:14ch;line-height:0.95;
  }
  .hero h1 em{font-style:normal;font-weight:700;background:linear-gradient(90deg,#fff,rgba(255,255,255,0.6));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .hero p{font-size:clamp(1rem, 1.6vw, 1.3rem);max-width:60ch;line-height:1.6;opacity:0.85;margin-top:10px;}
  .hero-hint{margin-top:40px;font-size:13px;opacity:0.55;letter-spacing:0.1em;text-transform:uppercase;display:flex;gap:18px;align-items:center;}
  .key{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:26px;height:26px;padding:0 8px;border-radius:6px;
    background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
    font-size:11px;font-family:var(--font-body);
  }

  /* ============= LAYOUT: LETTER SLIDE ============= */
  .letter-slide{display:grid;grid-template-columns:minmax(280px, 38%) 1fr;gap:clamp(20px, 2.5vw, 40px);flex:1;height:100%;}

  .letter-panel{
    display:flex;flex-direction:column;justify-content:space-between;
    padding:clamp(24px, 3vw, 44px);position:relative;overflow:hidden;
  }
  .letter-panel .letter-name{font-family:var(--font-body);font-size:13px;letter-spacing:0.3em;text-transform:uppercase;opacity:0.7;}
  .letter-display{
    font-family:var(--font-display);
    font-weight:800;font-style:italic;
    font-size:clamp(8rem, 22vw, 22rem);
    line-height:0.85;
    background:linear-gradient(160deg,#fff 30%, rgba(255,255,255,0.4) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 0 80px rgba(255,255,255,0.1);
    margin:auto 0;
  }
  .letter-display .lower{
    font-size:0.5em;opacity:0.55;font-style:normal;font-weight:500;margin-left:0.1em;
  }
  .letter-ipa{
    font-family:var(--font-display);font-style:italic;
    font-size:clamp(1.5rem, 2.5vw, 2.4rem);
    opacity:0.9;margin-top:8px;
  }
  .letter-name-es{font-size:13px;opacity:0.7;margin-top:4px;letter-spacing:0.05em;}

  .content-panel{
    display:grid;grid-template-rows:auto auto 1fr auto;gap:clamp(12px, 1.5vw, 20px);
    height:100%;min-height:0;
  }

  .tip-card, .words-card, .stress-card, .tobe-card{
    padding:clamp(16px, 2vw, 24px);
    display:flex;flex-direction:column;gap:6px;min-height:0;
  }

  .card-label{
    display:flex;align-items:center;gap:8px;
    font-size:11px;letter-spacing:0.2em;text-transform:uppercase;
    font-weight:600;opacity:0.85;
  }
  .card-label .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

  .tip-text{font-size:clamp(0.95rem, 1.15vw, 1.05rem);line-height:1.5;opacity:0.95;}
  .tip-text .highlight{background:rgba(255,255,255,0.14);padding:2px 8px;border-radius:6px;font-weight:500;}

  .words-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;margin-top:4px;
  }
  .word-card{
    padding:10px 14px;border-radius:12px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
    display:flex;flex-direction:column;gap:2px;
    transition:background 0.25s ease, border-color 0.25s ease;
    cursor:default;
  }
  .word-card:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2);}
  .word-card .w{font-family:var(--font-display);font-weight:700;font-size:1.2rem;font-style:italic;}
  .word-card .ipa{font-size:0.85rem;opacity:0.75;font-style:italic;}
  .word-card .es{font-size:0.75rem;opacity:0.6;margin-top:2px;}

  .stress-list{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;}
  .stress-item{
    padding:8px 14px;border-radius:10px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
    display:flex;flex-direction:column;gap:2px;min-width:120px;
  }
  .stress-item .s{font-family:var(--font-display);font-weight:600;font-size:1.05rem;}
  .stress-item .s .strong{font-weight:900;font-style:italic;}
  .stress-item .s-ipa{font-size:0.75rem;opacity:0.7;font-style:italic;}

  .tobe-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px;}
  .tobe-box{
    padding:10px 14px;border-radius:10px;
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  }
  .tobe-box .tag{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;opacity:0.7;margin-bottom:4px;}
  .tobe-box .tag.aff::before{content:"✓ ";color:#7fffb6;}
  .tobe-box .tag.neg::before{content:"✗ ";color:#ff8c8c;}
  .tobe-box .tag.int::before{content:"? ";color:#9cc7ff;}
  .tobe-box .sentence{font-size:0.95rem;line-height:1.4;}
  .tobe-box .sentence b{background:rgba(255,255,255,0.16);padding:1px 6px;border-radius:4px;font-weight:600;}

  /* ============= INTRO / OVERVIEW SLIDES ============= */
  .overview{display:flex;flex-direction:column;gap:24px;flex:1;padding:0;}
  .overview-header{padding:0 0 10px 0;}
  .overview h2{font-size:clamp(2rem,4.5vw,4rem);font-weight:400;font-style:italic;}
  .overview h2 em{font-style:normal;font-weight:700;}
  .overview-subtitle{font-size:clamp(1rem,1.3vw,1.15rem);opacity:0.8;max-width:70ch;margin-top:8px;line-height:1.5;}

  .alphabet-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
    gap:10px;flex:1;min-height:0;
  }
  .alpha-cell{
    aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:14px;cursor:pointer;
    transition:all 0.4s var(--ease-out);
    font-family:var(--font-display);font-weight:700;
    position:relative;overflow:hidden;
  }
  .alpha-cell::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(135deg,var(--c1),var(--c2));
    opacity:0.85;z-index:0;
  }
  .alpha-cell > *{position:relative;z-index:1;}
  .alpha-cell:hover{transform:translateY(-4px) scale(1.04);}
  .alpha-cell .big{font-size:2.2rem;font-style:italic;line-height:1;}
  .alpha-cell .name{font-family:var(--font-body);font-size:9px;font-weight:500;letter-spacing:0.1em;opacity:0.85;margin-top:2px;}

  /* ============= SPELLING BEE SLIDE ============= */
  .bee{display:grid;grid-template-columns:1fr 1fr;gap:30px;flex:1;align-items:stretch;}
  .bee-left{display:flex;flex-direction:column;justify-content:center;gap:20px;padding:clamp(20px,3vw,40px);}
  .bee-left h2{font-size:clamp(2rem,4.5vw,4.5rem);font-weight:500;font-style:italic;}
  .bee-left h2 em{font-weight:800;font-style:normal;}
  .bee-left p{font-size:clamp(1rem,1.3vw,1.2rem);line-height:1.6;opacity:0.9;}
  .bee-right{padding:clamp(20px,3vw,40px);display:flex;flex-direction:column;gap:16px;justify-content:center;}
  .bee-example{display:flex;align-items:baseline;gap:14px;font-family:var(--font-display);}
  .bee-word{font-size:clamp(2rem,4vw,3.5rem);font-weight:700;font-style:italic;}
  .bee-letters{display:flex;gap:8px;flex-wrap:wrap;}
  .bee-letter{
    width:44px;height:44px;display:flex;align-items:center;justify-content:center;
    border-radius:10px;background:rgba(255,255,255,0.1);
    font-family:var(--font-display);font-weight:700;font-size:1.3rem;
    border:1px solid rgba(255,255,255,0.15);
  }

  /* ============= VERB TO BE / PRONOUNS SLIDES ============= */
  .big-concept{display:flex;flex-direction:column;gap:clamp(16px,2vw,28px);flex:1;padding:0;height:100%;}
  .big-concept h2{font-size:clamp(2.5rem,5.5vw,5rem);font-weight:400;font-style:italic;line-height:1;}
  .big-concept h2 em{font-style:normal;font-weight:800;}
  .big-concept .subtitle{font-size:clamp(0.95rem,1.2vw,1.1rem);opacity:0.8;max-width:75ch;line-height:1.5;}

  .tobe-table{
    display:grid;grid-template-columns:auto 1fr 1fr;gap:12px 20px;
    padding:clamp(20px,2.5vw,36px);
    font-size:clamp(0.95rem,1.2vw,1.15rem);
    align-items:center;
  }
  .tobe-table .th{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;opacity:0.7;font-weight:600;padding-bottom:8px;}
  .tobe-table .pron{font-family:var(--font-display);font-weight:700;font-style:italic;font-size:1.25em;}
  .tobe-table .form{font-family:var(--font-display);}
  .tobe-table .form .v{background:rgba(255,255,255,0.16);padding:2px 8px;border-radius:6px;font-weight:700;}
  .tobe-table .contraction{opacity:0.75;font-size:0.9em;}
  .tobe-table .divider{grid-column:1 / -1;height:1px;background:rgba(255,255,255,0.1);margin:4px 0;}

  .examples-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:8px;}
  .example-card{padding:14px 18px;border-radius:14px;}
  .example-card .ex-tag{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;opacity:0.75;margin-bottom:6px;}
  .example-card .ex-text{font-family:var(--font-display);font-size:1.05rem;line-height:1.5;}
  .example-card .ex-text b{background:rgba(255,255,255,0.18);padding:1px 6px;border-radius:5px;}
  .example-card .ex-es{font-size:0.78rem;opacity:0.6;margin-top:6px;font-style:italic;}

  /* Pronoun cards */
  .pron-grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:14px;
  }
  .pron-card{
    padding:18px;border-radius:16px;
    display:flex;flex-direction:column;gap:6px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  }
  .pron-card .pn{font-family:var(--font-display);font-weight:700;font-style:italic;font-size:2rem;line-height:1;}
  .pron-card .pn-es{font-size:0.8rem;opacity:0.7;}
  .pron-card .use{font-size:0.85rem;opacity:0.85;margin-top:4px;line-height:1.4;}

  /* Introduction dialog */
  .dialog{
    padding:clamp(22px,2.5vw,36px);
    display:flex;flex-direction:column;gap:14px;
  }
  .dialog-line{font-family:var(--font-display);font-size:clamp(1rem,1.4vw,1.3rem);line-height:1.5;}
  .dialog-line b{background:rgba(255,255,255,0.18);padding:1px 8px;border-radius:5px;font-weight:700;}
  .dialog-line .me{color:#a8e6cf;font-weight:600;font-style:italic;font-size:0.9em;margin-right:8px;}
  .dialog-line .you{color:#ffd3b6;font-weight:600;font-style:italic;font-size:0.9em;margin-right:8px;}

  /* ============= EXERCISES ============= */
  .exercise{display:flex;flex-direction:column;gap:20px;flex:1;}
  .ex-header{display:flex;align-items:baseline;gap:16px;}
  .ex-header h2{font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:400;font-style:italic;}
  .ex-header h2 em{font-weight:800;font-style:normal;}
  .ex-number{font-family:var(--font-display);font-size:3rem;font-weight:900;font-style:italic;opacity:0.3;}
  .ex-instruction{font-size:1.05rem;opacity:0.85;line-height:1.5;max-width:70ch;}

  .ex-body{flex:1;display:flex;flex-direction:column;gap:16px;padding:clamp(20px,2.5vw,32px);min-height:0;overflow:auto;}

  .question{display:flex;flex-direction:column;gap:10px;padding:16px;border-radius:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);}
  .question-prompt{font-family:var(--font-display);font-size:1.15rem;}
  .question-prompt .blank{
    display:inline-block;min-width:80px;border-bottom:2px dashed rgba(255,255,255,0.4);
    padding:0 8px;text-align:center;font-weight:700;font-style:italic;
  }
  .question-prompt .blank.filled{border-bottom-color:transparent;background:rgba(255,255,255,0.12);border-radius:6px;padding:2px 10px;}
  .question-prompt .blank.correct{background:rgba(127,255,182,0.2);color:#a8ffcf;}
  .question-prompt .blank.wrong{background:rgba(255,140,140,0.2);color:#ffb0b0;}
  .options{display:flex;flex-wrap:wrap;gap:8px;}
  .opt-btn{
    padding:8px 16px;border-radius:10px;
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
    color:#fff;font-family:var(--font-body);font-size:0.95rem;cursor:pointer;
    transition:all 0.2s var(--ease-out);
  }
  .opt-btn:hover{background:rgba(255,255,255,0.15);transform:translateY(-1px);}
  .opt-btn.correct{background:rgba(127,255,182,0.25);border-color:rgba(127,255,182,0.5);}
  .opt-btn.wrong{background:rgba(255,140,140,0.2);border-color:rgba(255,140,140,0.5);}
  .opt-btn:disabled{cursor:default;}

  .ex-result{padding:12px 18px;border-radius:12px;font-size:1rem;font-weight:500;margin-top:8px;min-height:44px;display:flex;align-items:center;gap:10px;}
  .ex-result.good{background:rgba(127,255,182,0.15);color:#b8ffdb;}
  .ex-result.bad{background:rgba(255,140,140,0.12);color:#ffc8c8;}

  .ex-actions{display:flex;gap:10px;flex-wrap:wrap;align-self:flex-start;}
  .ex-action{
    padding:10px 22px;border-radius:12px;
    background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);
    color:#fff;font-family:var(--font-body);font-weight:500;font-size:0.95rem;cursor:pointer;
    transition:background 0.2s, transform 0.15s;
    display:inline-flex;align-items:center;gap:8px;
  }
  .ex-action:hover{background:rgba(255,255,255,0.25);}
  .ex-action:active{transform:scale(0.97);}
  .ex-action.secondary{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);}
  .ex-action.secondary:hover{background:rgba(255,255,255,0.12);}
  .ex-action:disabled{opacity:0.4;cursor:not-allowed;}
  .ex-action:disabled:hover{background:rgba(255,255,255,0.15);}

  /* ============= END SLIDE ============= */
  .end{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:24px;flex:1;}
  .end-mark{font-family:var(--font-display);font-style:italic;font-weight:700;font-size:clamp(5rem,14vw,14rem);line-height:1;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.5));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .end h2{font-size:clamp(2rem,5vw,4rem);font-weight:400;font-style:italic;}
  .end h2 em{font-weight:800;font-style:normal;}
  .end p{max-width:50ch;line-height:1.6;opacity:0.85;font-size:1.1rem;}
  .end-btn{margin-top:14px;padding:14px 32px;border-radius:14px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;cursor:pointer;font-size:1rem;font-weight:500;font-family:var(--font-body);transition:all 0.3s;}
  .end-btn:hover{background:rgba(255,255,255,0.25);transform:translateY(-2px);}

  /* ============= RESPONSIVE ============= */
  @media (max-width: 860px){
    .slide{padding:16px;}
    .slide-inner{overflow-y:auto;overflow-x:hidden;}
    .slide-inner::-webkit-scrollbar{width:0;height:0;}
    .letter-slide{grid-template-columns:1fr;grid-template-rows:auto auto;height:auto;}
    .letter-panel{padding:20px;min-height:auto;}
    .letter-display{font-size:clamp(5rem,28vw,10rem);margin:16px 0;}
    .content-panel{height:auto;}
    .bee{grid-template-columns:1fr;}
    .nav-btn{width:44px;height:44px;font-size:18px;}
    .nav-btn.prev{left:8px;}
    .nav-btn.next{right:8px;}
    .tobe-row{grid-template-columns:1fr;}
    .hud{top:12px;padding:6px 12px;}
    .hud-counter{font-size:12px;}
    .menu-btn{top:12px;right:12px;padding:8px 12px;font-size:12px;}
    .words-grid{grid-template-columns:repeat(2,1fr);}
    .tobe-table{grid-template-columns:auto 1fr;gap:8px 14px;font-size:0.9rem;}
    .tobe-table .th:nth-child(3),.tobe-table .contraction{display:none;}
  }

  /* Print style: show first slide only */
  @media print{.slide:not(.active){display:none;}}
</style>
</head>

}

function alphabetOverviewSlide(){
  const cells = LETTERS.map(l => `
    <div class="alpha-cell" style="--c1:${l.colors[0]};--c2:${l.colors[1]}" data-jump="${l.L}">
      <span class="big">${l.L}</span>
      <span class="name">${l.name}</span>
    </div>

  return `
  <div class="slide" data-title="El Alfabeto">
    ${bgLayer('#ec4899','#f59e0b')}
    <div class="slide-inner">

        <div class="overview-header">
          <div class="eyebrow">Las 26 letras</div>
          <h2>The <em>Alphabet</em></h2>
          <p class="overview-subtitle">El inglés tiene las mismas 26 letras que el español, pero sin la Ñ. <b>Haz clic en cualquier letra</b> para saltar directo a su pronunciación, sonidos y ejemplos.</p>
        </div>
        <div class="alphabet-grid">${cells}</div>
      </div>
    </div>
  </div>`;
}

function letterSlide(l, idx){
  const words = l.words.map(w => `
    <div class="word-card">
      <span class="w">${w.w}</span>
      <span class="ipa">${w.ipa}</span>
      <span class="es">${w.es}</span>
    </div>`).join('');
  const stress = l.stress.map(s => `
    <div class="stress-item">
      <span class="s">${s.s}</span>
      <span class="s-ipa">${s.ipa}</span>
    </div>`).join('');
  return `
  <div class="slide" data-title="${l.L} — ${l.name}" data-letter="${l.L}">
    ${bgLayer(l.colors[0], l.colors[1])}
    <div class="slide-inner">
      <div class="letter-slide">
        <div class="letter-panel glass">
          <div class="letter-name">Letter ${idx + 1} of 26</div>
          <div class="letter-display">${l.L}<span class="lower">${l.L.toLowerCase()}</span></div>
          <div>
            <div class="letter-ipa">${l.ipa} <span style="opacity:0.7;font-size:0.7em;">· ${l.name}</span></div>
            <div class="letter-name-es">${l.nameEs}</div>
          </div>
        </div>
        <div class="content-panel">
          <div class="tip-card glass">
            <div class="card-label"><span class="dot"></span>Posición de la lengua / Tip</div>
            <div class="tip-text">${l.tip}</div>
            <div class="tip-text" style="opacity:0.78;font-size:0.9em;"><b style="opacity:0.9">Sonido clave:</b> ${l.key}</div>
          </div>
          <div class="words-card glass">
            <div class="card-label"><span class="dot"></span>Palabras · Words</div>
            <div class="words-grid">${words}</div>
          </div>
          <div class="stress-card glass">
            <div class="card-label"><span class="dot"></span>Acento · Stress (2 sílabas)</div>
            <div class="stress-list">${stress}</div>
            <div style="font-size:0.78rem;opacity:0.65;margin-top:4px;font-style:italic;">La sílaba en MAYÚSCULAS suena más fuerte y larga.</div>
          </div>
          <div class="tobe-card glass">
            <div class="card-label"><span class="dot"></span>Verb To Be · mini-práctica con la letra ${l.L}</div>
            <div class="tobe-row">
              <div class="tobe-box"><div class="tag aff">Afirmativa</div><div class="sentence">${l.tobe.aff}</div></div>
              <div class="tobe-box"><div class="tag neg">Negativa</div><div class="sentence">${l.tobe.neg}</div></div>
              <div class="tobe-box"><div class="tag int">Interrogativa</div><div class="sentence">${l.tobe.int}</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

const slides = Array.from(document.querySelectorAll('.slide'));
const total = slides.length;
let current = 0;

// ===========================================================
// NAVIGATION
// ===========================================================
function go(i){
  if(i < 0 || i >= total) return;
  slides[current].classList.remove('active');
  current = i;
  slides[current].classList.add('active');
  document.getElementById('hudCounter').textContent =
    String(current + 1).padStart(2,'0') + ' / ' + String(total).padStart(2,'0');
  document.getElementById('progressBar').style.width = ((current + 1) / total * 100) + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === total - 1;
}
go(0);

document.getElementById('prevBtn').addEventListener('click', () => go(current - 1));
document.getElementById('nextBtn').addEventListener('click', () => go(current + 1));
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); go(current + 1); }
  else if(e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(current - 1); }
  else if(e.key === 'Home') { go(0); }
  else if(e.key === 'End') { go(total - 1); }
  else if(e.key === 'Escape'){ document.getElementById('menu').classList.remove('open'); }
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) < 50) return;
  if(dx < 0) go(current + 1); else go(current - 1);
}, {passive:true});

slides.forEach((s, i) => {

    ? (() => { const l = LETTERS.find(x => x.L === letter); return `background:linear-gradient(135deg,${l.colors[0]},${l.colors[1]});`; })()
    : 'background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);';
  const label = isLetter ? letter : (i+1);
  menuGrid.innerHTML += `
    <div class="menu-item" style="${bg}" data-idx="${i}">
      ${isLetter ? `<div style="font-size:2.6rem;">${letter}</div>` : `<div style="font-family:var(--font-display);font-size:1.8rem;">${i+1}</div>`}

});

});

});

});

ex3Questions.forEach((q, qi) => {
  const opts = q.options.map(o => `<button class="opt-btn" data-q="${qi}" data-val="${o}">${o}</button>`).join('');
  ex3Body.innerHTML += `<div class="question" data-q="${qi}">
    <div class="question-prompt">${qi+1}. ${q.parts[0]}<span class="blank" data-qblank="${qi}">?</span>${q.parts[1]}</div>
    <div class="options">${opts}</div>
  </div>`;
});
ex3Body.addEventListener('click', e => {
  const btn = e.target.closest('.opt-btn');
  if(!btn) return;
  const qi = btn.dataset.q;
  const qBlock = ex3Body.querySelector(`.question[data-q="${qi}"]`);
  qBlock.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected','correct','wrong'));
  btn.classList.add('selected');
  const blank = qBlock.querySelector('.blank');
  blank.textContent = btn.dataset.val;
  blank.classList.add('filled');
  blank.classList.remove('correct','wrong');
  qBlock.dataset.selected = btn.dataset.val;
});
document.getElementById('ex3-check').addEventListener('click', () => {
  let correct = 0, answered = 0;
  ex3Questions.forEach((q, qi) => {
    const qBlock = ex3Body.querySelector(`.question[data-q="${qi}"]`);
    const sel = qBlock.dataset.selected;
    if(sel) answered++;
    const blank = qBlock.querySelector('.blank');
    blank.classList.remove('correct','wrong');
    qBlock.querySelectorAll('.opt-btn').forEach(b => {
      b.classList.remove('correct','wrong');
      if(b.dataset.val === q.answer) b.classList.add('correct');
      else if(b.classList.contains('selected')) b.classList.add('wrong');
      b.disabled = true;
    });
    if(sel === q.answer){ correct++; blank.classList.add('correct'); }
    else if(sel) blank.classList.add('wrong');
  });
  const res = document.getElementById('ex3-result');
  if(answered === 0){
    res.className = 'ex-result bad';
    res.innerHTML = `⚠️ Primero completa al menos una oración.`;
    ex3Body.querySelectorAll('.opt-btn').forEach(b => b.disabled = false);
    return;
  }
  res.className = 'ex-result ' + (correct === ex3Questions.length ? 'good' : (correct >= ex3Questions.length/2 ? 'good' : 'bad'));
  res.innerHTML = correct === ex3Questions.length
    ? `🎉 ¡Increíble! ${correct}/${ex3Questions.length} — ¡listo para conversar en inglés!`
    : `${correct >= ex3Questions.length/2 ? '👍 Buen trabajo' : '💪 Revisa pronombres y to be'} · ${correct}/${ex3Questions.length} correctas.`;
});
document.getElementById('ex3-reset').addEventListener('click', () => {
  ex3Body.querySelectorAll('.opt-btn').forEach(b => {
    b.classList.remove('selected','correct','wrong');
    b.disabled = false;
  });
  ex3Body.querySelectorAll('.question').forEach(q => delete q.dataset.selected);
  ex3Body.querySelectorAll('.blank').forEach(b => {
    b.textContent = '?';
    b.classList.remove('filled','correct','wrong');
  });
  const res = document.getElementById('ex3-result');
  res.className = 'ex-result';
  res.innerHTML = '';
});
</script>
</body>
</html>
